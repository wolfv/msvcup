name: Build and Upload to prefix.dev

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-64
            os: ubuntu-latest
          - platform: linux-aarch64
            os: ubuntu-latest
          - platform: osx-64
            os: macos-13
          - platform: osx-arm64
            os: macos-latest
          - platform: win-64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          run-install: false

      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.25
        with:
          recipe-path: recipe/recipe.yaml
          upload-artifact: true
          build-args: --experimental --target-platform ${{ matrix.platform }}

  upload:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: packages
          pattern: "rattler-build-*"
          merge-multiple: true

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          run-install: false

      - name: Upload to prefix.dev
        run: |
          find packages -name '*.conda' -exec \
            rattler-build upload prefix -c automsvc {} \;
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
