name: Build and Upload to prefix.dev

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-64
            os: ubuntu-latest
          - platform: linux-aarch64
            os: ubuntu-24.04-arm
          - platform: osx-arm64
            os: macos-latest
          - platform: win-64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.8.8

      - name: Build conda package
        run: pixi run build --target-platform ${{ matrix.platform }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.platform }}
          path: output/**/*.conda

  upload:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.8.8

      - uses: actions/download-artifact@v4
        with:
          path: packages
          pattern: "packages-*"
          merge-multiple: true

      - name: Upload to prefix.dev
        run: |
          find packages -name '*.conda' -exec \
            pixi run rattler-build upload prefix -c automsvc {} \;
