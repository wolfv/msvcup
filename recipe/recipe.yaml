context:
  name: msvcup
  version: "0.1.0"
  # MSVC toolchain version (build version from VS manifest)
  msvc_version: "14.44.17.14"
  # Windows SDK version
  sdk_version: "10.0.26100.7"
  # VS year / version identifiers
  vsyear: "2022"
  vsver: "17"
  vcver: "14.3"
  # cl.exe version (for the package version of vs2022_*)
  cl_version: "19.44.35207"

recipe:
  name: msvcup-packages
  version: ${{ version }}

source:
  - path: ../

build:
  number: 0

outputs:
  # --- msvcup CLI tool ---
  - package:
      name: ${{ name }}
      version: ${{ version }}
    build:
      script:
        - cargo install --locked --path . --root ${{ PREFIX }} --no-track --no-default-features --features native-tls
    requirements:
      build:
        - ${{ compiler('rust') }}
        - ${{ compiler('c') }}
      host:
        - openssl
    tests:
      - package_contents:
          bin:
            - msvcup
            - msvcup-autoenv
      - script:
          - msvcup --help

  # --- vs2022_win-64: compiler activation with lazy install ---
  - package:
      name: vs${{ vsyear }}_win-64
      version: ${{ cl_version }}
    build:
      skip:
        - not win64
      script:
        - if not exist "%PREFIX%\etc\conda\activate.d" mkdir "%PREFIX%\etc\conda\activate.d"
        - if not exist "%PREFIX%\etc\conda\deactivate.d" mkdir "%PREFIX%\etc\conda\deactivate.d"
        - if not exist "%PREFIX%\bin" mkdir "%PREFIX%\bin"
        # Write msvcup.toml config
        - |
          (
            echo [msvcup]
            echo install_dir = "%USERPROFILE%\\.msvcup"
            echo cache_dir = "%USERPROFILE%\\.msvcup\\cache"
            echo lock_file = "msvc.lock"
            echo target_arch = "x64"
            echo.
            echo [packages]
            echo msvc = "${{ msvc_version }}"
            echo sdk = "${{ sdk_version }}"
          ) > %PREFIX%\bin\msvcup.toml
        # Run resolve to generate lock file and place shim executables
        - msvcup resolve --config %PREFIX%\bin\msvcup.toml --out-dir %PREFIX%\bin --manifest-update always
        # Write activation script
        - |
          (
            echo @echo off
            echo set "CC=cl.exe"
            echo set "CXX=cl.exe"
            echo set "DISTUTILS_USE_SDK=1"
            echo set "MSSdk=1"
            echo set "VS_VERSION=${{ vsver }}.0"
            echo set "VS_MAJOR=${{ vsver }}"
            echo set "VS_YEAR=${{ vsyear }}"
          ) > %PREFIX%\etc\conda\activate.d\vs${{ vsyear }}_activate.bat
        # Write deactivation script
        - |
          (
            echo @echo off
            echo set "CC="
            echo set "CXX="
            echo set "DISTUTILS_USE_SDK="
            echo set "MSSdk="
            echo set "VS_VERSION="
            echo set "VS_MAJOR="
            echo set "VS_YEAR="
          ) > %PREFIX%\etc\conda\deactivate.d\vs${{ vsyear }}_deactivate.bat
    requirements:
      build:
        - ${{ name }}
      run:
        - ${{ name }}
      run_exports:
        strong:
          - vc >=${{ vcver }},<15
    tests:
      - package_contents:
          bin:
            - cl
            - link
            - lib
            - ml64
            - rc
            - mt
          files:
            - bin/msvcup.toml
            - bin/msvc.lock
            - bin/toolchain.cmake
            - etc/conda/activate.d/vs${{ vsyear }}_activate.bat
            - etc/conda/deactivate.d/vs${{ vsyear }}_deactivate.bat

  # --- vs2022_win-arm64: compiler activation for ARM64 target ---
  - package:
      name: vs${{ vsyear }}_win-arm64
      version: ${{ cl_version }}
    build:
      skip:
        - not (win and arm64)
      script:
        - if not exist "%PREFIX%\etc\conda\activate.d" mkdir "%PREFIX%\etc\conda\activate.d"
        - if not exist "%PREFIX%\etc\conda\deactivate.d" mkdir "%PREFIX%\etc\conda\deactivate.d"
        - if not exist "%PREFIX%\bin" mkdir "%PREFIX%\bin"
        - |
          (
            echo [msvcup]
            echo install_dir = "%USERPROFILE%\\.msvcup"
            echo cache_dir = "%USERPROFILE%\\.msvcup\\cache"
            echo lock_file = "msvc.lock"
            echo target_arch = "arm64"
            echo.
            echo [packages]
            echo msvc = "${{ msvc_version }}"
            echo sdk = "${{ sdk_version }}"
          ) > %PREFIX%\bin\msvcup.toml
        - msvcup resolve --config %PREFIX%\bin\msvcup.toml --out-dir %PREFIX%\bin --manifest-update always
        - |
          (
            echo @echo off
            echo set "CC=cl.exe"
            echo set "CXX=cl.exe"
            echo set "DISTUTILS_USE_SDK=1"
            echo set "MSSdk=1"
            echo set "VS_VERSION=${{ vsver }}.0"
            echo set "VS_MAJOR=${{ vsver }}"
            echo set "VS_YEAR=${{ vsyear }}"
          ) > %PREFIX%\etc\conda\activate.d\vs${{ vsyear }}_activate.bat
        - |
          (
            echo @echo off
            echo set "CC="
            echo set "CXX="
            echo set "DISTUTILS_USE_SDK="
            echo set "MSSdk="
            echo set "VS_VERSION="
            echo set "VS_MAJOR="
            echo set "VS_YEAR="
          ) > %PREFIX%\etc\conda\deactivate.d\vs${{ vsyear }}_deactivate.bat
    requirements:
      build:
        - ${{ name }}
      run:
        - ${{ name }}
      run_exports:
        strong:
          - vc >=${{ vcver }},<15
    tests:
      - package_contents:
          bin:
            - cl
            - link
            - lib
            - rc
            - mt
          files:
            - bin/msvcup.toml
            - bin/msvc.lock
            - bin/toolchain.cmake
            - etc/conda/activate.d/vs${{ vsyear }}_activate.bat
            - etc/conda/deactivate.d/vs${{ vsyear }}_deactivate.bat

  # --- vs_win-64: generic alias ---
  - package:
      name: vs_win-64
      version: ${{ vsyear }}.${{ vcver }}
    build:
      skip:
        - not win64
    requirements:
      run:
        - vs${{ vsyear }}_win-64 ==${{ cl_version }}
    tests:
      - script:
          - echo vs_win-64 installed

  # --- vs_win-arm64: generic alias ---
  - package:
      name: vs_win-arm64
      version: ${{ vsyear }}.${{ vcver }}
    build:
      skip:
        - not (win and arm64)
    requirements:
      run:
        - vs${{ vsyear }}_win-arm64 ==${{ cl_version }}
    tests:
      - script:
          - echo vs_win-arm64 installed

about:
  homepage: https://github.com/wolfv/msvcup
  repository: https://github.com/wolfv/msvcup
  license: BSD-3-Clause
  license_file: LICENSE
  summary: MSVC toolchain installer and compiler activation packages
  description: |
    msvcup downloads and installs the MSVC compiler toolchain and Windows SDK
    without requiring Visual Studio. The vs2022_* packages provide conda-forge
    compatible compiler activation that lazily installs MSVC on first use.
